# podman-compose.yml — production deployment (pre-built image from ghcr.io)
# Usage:
#   podman-compose up -d
#   podman-compose down
#
# Image is built and pushed by .github/workflows/publish.yml on every push to main.
# For local development (build from source), use podman-compose.dev.yml instead.
#
# Requires: podman-compose (pip install podman-compose)
# Credentials: copy .env.example to .env and fill in your values

services:
  cfd-trading:
    image: ghcr.io/cdr74/cfd-trading:latest
    container_name: cfd-trading
    ports:
      - "8089:8089"   # host_port:container_port — HTTPS endpoint: https://localhost:8089/mcp
    env_file:
      - .env
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8089
      - SSL_CERTFILE=/certs/cert.pem
      - SSL_KEYFILE=/certs/key.pem
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ../certs:/certs:ro
    restart: unless-stopped
    logging:
      driver: "journald"
      options:
        tag: "cfd-trading"
