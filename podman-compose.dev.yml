# podman-compose.dev.yml — local development build
# Usage:
#   podman-compose -f podman-compose.dev.yml up --build
#   podman-compose -f podman-compose.dev.yml down
#
# Builds from source with debug logging enabled.
# Credentials: copy .env.example to .env and fill in your values

services:
  cfd-trading:
    build:
      context: ..
      dockerfile: cfd-trading/Containerfile
    container_name: cfd-trading-dev
    ports:
      - "8089:8089"   # host_port:container_port — SSE endpoint: http://localhost:8089/sse
    env_file:
      - .env
    environment:
      - MCP_TRANSPORT=sse
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8089
      - LOG_LEVEL=DEBUG
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    logging:
      driver: "journald"
      options:
        tag: "cfd-trading-dev"
