name: orb
description: "Opening Range Breakout — 2-bar (30-min) OR defines range; stop at OR boundary; 2×OR-width TP"
resolution: M15       # ORB is defined on M15 bars. Source of truth for live monitor + backtest.

entry:
  min_size: 0.1
  max_size: 5.0

risk:
  target_risk_pct: 1.0
  stop_loss:
    type: HARD
    default_pct: 0.5    # fallback only — OR-width stop from get_entry_levels() takes precedence
    max_pct: 2.0
  trailing_stop:
    enabled: false             # ORB: OR-width stop + fixed 2×OR-width TP only (RESEARCH; catalog §13)
  take_profit:
    dynamic: true
    min_rr_ratio: 2.0
    max_pct: 10.0
  position_scaling:
    enabled: false
    max_adds: 0
    max_total_size: 5.0
  time_exit:
    enabled: true
    close_minutes_before_session_end: 30
