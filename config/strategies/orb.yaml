name: orb
description: "Opening Range Breakout — 2-bar (30-min) OR defines range; stop at OR boundary; ATR-trailing exit"

# Instruments with confirmed ORB edge (v2 backtest: DE40 PF 1.62, UK100 PF 1.19, USDJPY PF 1.27)
instruments:
  - DE40
  - UK100
  - USDJPY

entry:
  min_size: 0.1
  max_size: 5.0

risk:
  target_risk_pct: 1.0
  stop_loss:
    type: HARD
    default_pct: 0.5    # fallback only — OR-width stop from get_entry_levels() takes precedence
    max_pct: 2.0
  trailing_stop:
    enabled: true
    atr_multiplier: 1.5   # trail at 1.5 × ATR(14) from bar high/low peak
    min_distance_pct: 0.3  # fallback used by evaluate_position if atr_multiplier absent
  take_profit:
    dynamic: false
    min_rr_ratio: 99    # effectively disabled — ATR trailing stop is the exit
    max_pct: 99.0
  position_scaling:
    enabled: false
    max_adds: 0
    max_total_size: 5.0
  time_exit:
    enabled: true
    close_minutes_before_session_end: 30
