name: mean_reversion
description: Range-bound strategy targeting overextended moves with fixed take profit

entry:
  min_size: 0.1
  max_size: 3.0

risk:
  target_risk_pct: 0.5
  stop_loss:
    type: HARD
    default_pct: 1.5
    max_pct: 3.0
  trailing_stop:
    enabled: false
  take_profit:
    dynamic: false
    min_rr_ratio: 2.0
    max_pct: 6.0
  position_scaling:
    enabled: false
    max_adds: 0
    max_total_size: 3.0
  time_exit:
    enabled: true
    close_minutes_before_session_end: 30
