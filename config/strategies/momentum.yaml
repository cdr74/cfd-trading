name: momentum
description: Trend-following strategy targeting breakouts with trailing stop management
resolution: M30       # 2026-05-15: M30 (3-yr data, cleanest gap development; ITSM/RESEARCH basis). M15 is a viable future option. Source of truth for live monitor + backtest.

entry:
  min_size: 0.1
  max_size: 5.0

risk:
  target_risk_pct: 1.0
  stop_loss:
    type: HARD
    default_pct: 2.0
    max_pct: 5.0
  trailing_stop:
    enabled: true
    mode: fixed_atr            # distance = ATR14@entry × atr_multiplier, fixed for the trade, ratchet-only
    atr_multiplier: 1.5
    update_interval_min: 1
  take_profit:
    dynamic: true
    min_rr_ratio: 1.5
    max_pct: 10.0
  position_scaling:
    enabled: true
    max_adds: 2
    max_total_size: 10.0
  time_exit:
    enabled: true
    close_minutes_before_session_end: 30
