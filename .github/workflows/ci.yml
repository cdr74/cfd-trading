name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cfd-trading
        uses: actions/checkout@v5

      - name: Checkout capital-mcp-server
        uses: actions/checkout@v5
        with:
          repository: cdr74/capital-mcp-server
          path: capital-mcp-server
          token: ${{ secrets.GH_PAT }}

      - name: Checkout capital-com-client
        uses: actions/checkout@v5
        with:
          repository: cdr74/capital-com-client
          path: capital-com-client
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e capital-com-client
          pip install --no-deps -e capital-mcp-server
          pip install "fastmcp>=3.0.0,<4.0.0" "requests>=2.25.0" "pydantic>=2.0.0" "python-dotenv>=1.0.0"
          pip install --no-deps -e .
          pip install "anthropic>=0.40.0" "mcp[cli]>=1.0.0" "pyyaml>=6.0" "requests>=2.31.0" "pydantic>=2.0.0" "python-dotenv>=1.0.0"
          pip install "pytest>=8.0" "pytest-asyncio>=0.23"

      - name: Run unit tests
        run: pytest tests/unit/ -v

  integration-tests:
    name: Integration Tests (demo API)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout cfd-trading
        uses: actions/checkout@v5

      - name: Checkout capital-mcp-server
        uses: actions/checkout@v5
        with:
          repository: cdr74/capital-mcp-server
          path: capital-mcp-server
          token: ${{ secrets.GH_PAT }}

      - name: Checkout capital-com-client
        uses: actions/checkout@v5
        with:
          repository: cdr74/capital-com-client
          path: capital-com-client
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e capital-com-client
          pip install --no-deps -e capital-mcp-server
          pip install "fastmcp>=3.0.0,<4.0.0" "requests>=2.25.0" "pydantic>=2.0.0" "python-dotenv>=1.0.0"
          pip install --no-deps -e .
          pip install "anthropic>=0.40.0" "mcp[cli]>=1.0.0" "pyyaml>=6.0" "requests>=2.31.0" "pydantic>=2.0.0" "python-dotenv>=1.0.0"
          pip install "pytest>=8.0" "pytest-asyncio>=0.23"

      - name: Run integration tests
        env:
          CAPITAL_BASE_URL: ${{ secrets.CAPITAL_BASE_URL }}
          CAPITAL_API_KEY: ${{ secrets.CAPITAL_API_KEY }}
          CAPITAL_IDENTIFIER: ${{ secrets.CAPITAL_IDENTIFIER }}
          CAPITAL_API_KEY_PASSWORD: ${{ secrets.CAPITAL_API_KEY_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pytest tests/integration/ -m integration -v
