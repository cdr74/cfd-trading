name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cfd-trading
        uses: actions/checkout@v4

      - name: Checkout capital-mcp-server
        uses: actions/checkout@v4
        with:
          repository: cdr74/capital-mcp-server
          path: capital-mcp-server
          ssh-key: ${{ secrets.CAPITAL_MCP_SERVER_DEPLOY_KEY }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e capital-mcp-server
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -v

  integration-tests:
    name: Integration Tests (demo API)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout cfd-trading
        uses: actions/checkout@v4

      - name: Checkout capital-mcp-server
        uses: actions/checkout@v4
        with:
          repository: cdr74/capital-mcp-server
          path: capital-mcp-server
          ssh-key: ${{ secrets.CAPITAL_MCP_SERVER_DEPLOY_KEY }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e capital-mcp-server
          pip install -e ".[dev]"

      - name: Run integration tests
        env:
          CAPITAL_BASE_URL: ${{ secrets.CAPITAL_BASE_URL }}
          CAPITAL_API_KEY: ${{ secrets.CAPITAL_API_KEY }}
          CAPITAL_IDENTIFIER: ${{ secrets.CAPITAL_IDENTIFIER }}
          CAPITAL_API_KEY_PASSWORD: ${{ secrets.CAPITAL_API_KEY_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pytest tests/integration/ -m integration -v
