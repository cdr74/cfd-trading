name: Build and publish container image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cfd-trading
        uses: actions/checkout@v5

      - name: Checkout capital-mcp-server
        uses: actions/checkout@v5
        with:
          repository: cdr74/capital-mcp-server
          path: capital-mcp-server
          token: ${{ secrets.GH_PAT }}

      - name: Checkout capital-com-client
        uses: actions/checkout@v5
        with:
          repository: cdr74/capital-com-client
          path: capital-com-client
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e capital-com-client
          pip install --no-deps -e capital-mcp-server
          pip install "fastmcp>=3.0.0,<4.0.0" "requests>=2.25.0" "pydantic>=2.0.0" "python-dotenv>=1.0.0"
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -v

      - name: Run integration tests
        env:
          CAPITAL_BASE_URL: ${{ secrets.CAPITAL_BASE_URL }}
          CAPITAL_API_KEY: ${{ secrets.CAPITAL_API_KEY }}
          CAPITAL_IDENTIFIER: ${{ secrets.CAPITAL_IDENTIFIER }}
          CAPITAL_API_KEY_PASSWORD: ${{ secrets.CAPITAL_API_KEY_PASSWORD }}
        run: pytest tests/integration/ -m integration -v

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout cfd-trading
        uses: actions/checkout@v5
        with:
          path: cfd-trading

      - name: Checkout capital-mcp-server
        uses: actions/checkout@v5
        with:
          repository: cdr74/capital-mcp-server
          path: capital-mcp-server
          token: ${{ secrets.GH_PAT }}

      - name: Checkout capital-com-client
        uses: actions/checkout@v5
        with:
          repository: cdr74/capital-com-client
          path: capital-com-client
          token: ${{ secrets.GH_PAT }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: cfd-trading/Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
